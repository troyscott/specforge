{# Middle panel: the editable draft spec. WI-6 wires the summary field, which
   PATCHes on change and swaps the gate panel. WI-8 adds the remaining fields,
   criteria editing, and the draft / approve actions. #}
<section id="spec-form" class="spec-form" aria-label="Draft spec">
  <h2 class="panel-title">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="20" height="20"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path stroke="none" d="M0 0h24v24H0z" fill="none" />
      <path d="M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1" />
      <path d="M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415z" />
      <path d="M16 5l3 3" />
    </svg>
    Draft spec
  </h2>

  <form
    class="field"
    hx-patch="/refining/{{ spec.issue_id }}/summary"
    hx-target="#gate-panel"
    hx-swap="outerHTML"
    hx-trigger="change from:#summary, submit"
  >
    <label class="field-label" for="summary">Summary</label>
    <input
      type="text"
      id="summary"
      name="summary"
      class="field-input"
      value="{{ spec.summary }}"
      placeholder="One-line summary of the refined work"
    />
  </form>

  {% include "partials/needs_input.html" %}
</section>
